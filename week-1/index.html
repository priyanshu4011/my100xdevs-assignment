<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elevenlabs signup clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <div class="card">
        <p class="logo">IIEevenlabs</p>
        <h2>create an account</h2>
        <button class="google-btn"> 
            <img src="httpss://upload.wikimedia.org/wikimedia/commons/c/c1/google_%22g%22_logo.svg" alt="google-logo" width="20">
            sign up with google-btn
            </button>
            <form>
            <div class="input-group">
            <label>email</label>
            <input type="email" placeholder="email">
        </div>
        <div class="input-group">
            <label>password</label>
            <input type="password"placeholder="password">
        </div>
        <button type="submit" class="submit-btn">sign up</button>
    </form>
    <p class="fotter-text">already registered? <a href="#">sign in</a></p>
</div>
</body>
</html>
